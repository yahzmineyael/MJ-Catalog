const SB_URL = "https://pqnzgqfwikdathpicche.supabase.co";
const SB_KEY = "sb_publishable_Ya3pzj3ckcnOhQ5LFgHXmA_Ji2ce0ch";
const SB_HEADERS = { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` };

async function dbFetchPhotos() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/photos?select=*&order=created_at.desc`, { headers: SB_HEADERS });
    if (!res.ok) return [];
    const rows = await res.json();
    return rows.map(r => ({
      id: r.id, title: r.title, era: r.era, year: r.year,
      source: r.source, notes: r.notes, tags: r.tags || [],
      aspect: r.aspect || "square", placeholder: r.image_url,
      verified: r.verified, isFromDB: true
    }));
  } catch { return []; }
}

async function dbUploadImage(file) {
  const ext = file.name.split(".").pop().toLowerCase();
  const filename = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const res = await fetch(`${SB_URL}/storage/v1/object/photos/${filename}`, {
    method: "POST",
    headers: { ...SB_HEADERS, "Content-Type": file.type },
    body: file,
  });
  if (!res.ok) throw new Error("Image upload failed");
  return `${SB_URL}/storage/v1/object/public/photos/${filename}`;
}

async function dbSavePhoto(photo) {
  const res = await fetch(`${SB_URL}/rest/v1/photos`, {
    method: "POST",
    headers: { ...SB_HEADERS, "Content-Type": "application/json", "Prefer": "return=representation" },
    body: JSON.stringify({
      id: photo.id, title: photo.title, era: photo.era, year: photo.year,
      source: photo.source, notes: photo.notes, tags: photo.tags,
      aspect: photo.aspect, image_url: photo.placeholder, verified: true
    }),
  });
  if (!res.ok) throw new Error("Save failed");
}

// ── Placeholder generator (for hero backgrounds only) ─────────────────────────
function makePlaceholder(seed, label, year, wide=false) {
  const palettes = [
    ["#1a0828","#a05080"],["#1a0204","#803040"],["#020818","#304880"],
    ["#120c00","#806020"],["#060e14","#406080"],["#020e0a","#2a7850"],
    ["#0e0c04","#806040"],["#140828","#7040a0"],["#1a0e04","#905030"],
    ["#0a0414","#703060"],["#041408","#307050"],
  ];
  const [bg,accent]=palettes[seed%palettes.length];
  const w=wide?1400:400, h=wide?500:520;
  const short=label.length>18?label.slice(0,18)+"…":label;
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}' viewBox='0 0 ${w} ${h}'>
    <defs><radialGradient id='g${seed}' cx='50%' cy='40%' r='70%'>
      <stop offset='0%' stop-color='${accent}' stop-opacity='0.28'/>
      <stop offset='100%' stop-color='${bg}' stop-opacity='1'/>
    </radialGradient></defs>
    <rect width='${w}' height='${h}' fill='${bg}'/>
    <rect width='${w}' height='${h}' fill='url(#g${seed})'/>
    ${wide
      ?`<text x='${w/2}' y='${h/2+10}' font-family='serif' font-size='48' fill='${accent}' fill-opacity='0.15' text-anchor='middle'>✦</text>`
      :`<circle cx='200' cy='210' r='72' fill='none' stroke='${accent}' stroke-width='1' stroke-opacity='0.35'/>
        <text x='200' y='218' font-family='serif' font-size='28' fill='${accent}' fill-opacity='0.3' text-anchor='middle'>✦</text>
        <text x='200' y='320' font-family='Georgia,serif' font-size='13' fill='${accent}' fill-opacity='0.75' text-anchor='middle' font-style='italic'>${short}</text>
        <text x='200' y='340' font-family='monospace' font-size='10' fill='${accent}' fill-opacity='0.4' text-anchor='middle'>${year||"—"}</text>
        <text x='200' y='490' font-family='monospace' font-size='8' fill='${accent}' fill-opacity='0.18' text-anchor='middle' letter-spacing='3'>ADD YOUR PHOTO</text>`
    }
  </svg>`;
  return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))}`;
}

  const [visible,setVisible]=useState(false);
  const [isMobile,setIsMobile]=useState(window.innerWidth<600);
  useEffect(()=>{
    setTimeout(()=>setVisible(true),80);
    const h=()=>setIsMobile(window.innerWidth<600);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  const handleEnter=()=>{setEntered(true);setTimeout(onEnter,700);};
  const frames=isMobile?COLLAGE_MOBILE:COLLAGE_DESKTOP;
  return(
    <div style={{position:"fixed",inset:0,zIndex:2000,background:"#080410",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",opacity:entered?0:1,transition:entered?"opacity 0.7s ease":"none",overflow:"hidden"}}>

            <div style={{position:"absolute",bottom:"8px",left:"8px",right:"8px"}}>
              <p style={{margin:0,fontFamily:"Georgia,serif",fontSize:"11px",color:"rgba(255,255,255,0.7)",fontStyle:"italic"}}>{f.title}</p>
              <p style={{margin:"2px 0 0",fontFamily:"monospace",fontSize:"9px",color:"rgba(255,255,255,0.35)"}}>{f.year}</p>

        {photo.tags?.length>0&&<div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"7px"}}>{photo.tags.map(t=><span key={t} style={{fontFamily:"monospace",fontSize:"9px",textTransform:"uppercase",color:C.tagColor,border:`1px solid ${C.tagBorder}`,borderRadius:"2px",padding:"1px 5px"}}>{t}</span>)}</div>}
      </div>
    </div>
  );
}

// ── Timeline ───────────────────────────────────────────────────────────────────
function TimelineView({photos,onPhotoClick,theme,C}){
  const byYear=[...photos].sort((a,b)=>(a.year||9999)-(b.year||9999)).reduce((acc,p)=>{const y=p.year||"Unknown";if(!acc[y])acc[y]=[];acc[y].push(p);return acc;},{});
  return(
    <div style={{position:"relative",paddingLeft:"32px"}}>
      <div style={{position:"absolute",left:"10px",top:0,bottom:0,width:"1px",background:`linear-gradient(to bottom,transparent,${theme.accent}44 5%,${theme.accent}44 95%,transparent)`}}/>
      {Object.keys(byYear).sort((a,b)=>Number(a)-Number(b)).map(year=>(
        <div key={year} style={{marginBottom:"40px",position:"relative"}}>
          <div style={{position:"absolute",left:"-32px",top:"4px"}}><div style={{width:"9px",height:"9px",borderRadius:"50%",background:theme.accent,border:`2px solid ${C.pageBg}`,marginLeft:"6px",boxShadow:`0 0 8px ${theme.accent}66`}}/></div>
          <div style={{marginBottom:"14px",display:"flex",alignItems:"baseline",gap:"12px"}}>
            <span style={{fontFamily:"'Teko',sans-serif",fontSize:"26px",color:theme.accent,fontWeight:700,letterSpacing:"0.04em"}}>{year}</span>
            <span style={{fontFamily:"monospace",fontSize:"10px",color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.1em"}}>{byYear[year].length} photo{byYear[year].length!==1?"s":""}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"12px"}}>
            {byYear[year].map(photo=>(
              <div key={photo.id} onClick={()=>onPhotoClick(photo)}
                style={{cursor:"pointer",overflow:"hidden",borderRadius:"4px",border:`1px solid ${C.cardBorder}`,background:C.cardBg,transition:"border-color 0.2s,transform 0.2s",opacity:photo.isSample?0.5:1}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=theme.badgeBorder;e.currentTarget.style.transform="translateY(-2px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.cardBorder;e.currentTarget.style.transform="translateY(0)";}}>
                <div style={{height:"160px",overflow:"hidden",position:"relative"}}>
                  <img src={photo.placeholder} alt={photo.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.7) 100%)"}}/>
                  <div style={{position:"absolute",top:"6px",right:"6px"}}>{!photo.isSample&&<VerifiedBadge theme={theme}/>}</div>
                </div>
                <div style={{padding:"9px 11px 11px"}}>
                  <p style={{margin:0,fontFamily:"Georgia,serif",fontSize:"13px",color:C.text,fontStyle:"italic",lineHeight:1.3}}>{photo.title}</p>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"6px"}}>
                    <span style={{fontFamily:"monospace",fontSize:"9px",color:C.textMuted,textTransform:"uppercase"}}>{photo.era}</span>
                    {!photo.isSample&&<button onClick={e=>{e.stopPropagation();downloadPhoto(photo);}} style={{background:"none",border:`1px solid ${C.saveBtnBorder}`,color:C.saveBtnColor,borderRadius:"3px",cursor:"pointer",fontSize:"9px",padding:"2px 5px",fontFamily:"monospace",transition:"all 0.2s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=theme.accent;e.currentTarget.style.color=theme.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.saveBtnBorder;e.currentTarget.style.color=C.saveBtnColor;}}>↓</button>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Lightbox ───────────────────────────────────────────────────────────────────

      <button onClick={e=>{e.stopPropagation();onPrev();}} style={{background:"none",border:`1px solid ${C.navArrowBorder}`,color:C.navArrow,width:"42px",height:"42px",borderRadius:"50%",cursor:"pointer",fontSize:"20px",flexShrink:0,marginRight:"20px",transition:"all 0.2s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=theme.accent;e.currentTarget.style.color=theme.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.navArrowBorder;e.currentTarget.style.color=C.navArrow;}}>‹</button>

          <div style={{display:"flex",gap:"18px",flexWrap:"wrap",marginBottom:"10px"}}>

              <span key={k} style={{fontFamily:"monospace",fontSize:"11px"}}>

                <span style={{color:C.textMuted}}>{v}</span>

            ))}
          </div>
          {photo.notes&&<p style={{margin:"0 0 10px",fontFamily:"monospace",fontSize:"11px",color:C.textMuted,lineHeight:1.6}}>{photo.notes}</p>}
          {photo.tags?.length>0&&<div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"14px"}}>{photo.tags.map(t=><span key={t} style={{fontFamily:"monospace",fontSize:"9px",textTransform:"uppercase",color:C.tagColor,border:`1px solid ${C.tagBorder}`,borderRadius:"2px",padding:"2px 6px"}}>{t}</span>)}</div>}
          {!photo.isSample&&<button onClick={()=>downloadPhoto(photo)} style={{background:theme.accent,border:"none",color:"#fff",padding:"9px 20px",borderRadius:"3px",cursor:"pointer",fontFamily:"monospace",fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:"bold"}}>↓ Save Photo</button>}
        </div>
      </div>

    </div>
  );
}

// ── Upload modal ───────────────────────────────────────────────────────────────
function UploadModal({onClose,onUpload,theme,C}){
  const [form,setForm]=useState({title:"",era:"Thriller",year:"",source:"",notes:"",tags:"",aspect:"square"});
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [submitting,setSubmitting]=useState(false);
  const [error,setError]=useState("");
  const fileRef=useRef();
  const ready=form.title&&preview&&!submitting;

  const readFile=f=>{
    if(!f||!f.type.startsWith("image/"))return;
    setFile(f);
    const r=new FileReader();
    r.onload=ev=>setPreview(ev.target.result);
    r.readAsDataURL(f);
  };

  const handleSubmit=async()=>{
    if(!ready)return;
    setSubmitting(true);
    setError("");
    try{
      const imageUrl=await dbUploadImage(file);
      const photoData={
        id:`u-${Date.now()}`,title:form.title,era:form.era,
        year:parseInt(form.year)||null,source:form.source||"Personal Archive",
        notes:form.notes,tags:form.tags.split(",").map(t=>t.trim()).filter(Boolean),
        aspect:form.aspect,placeholder:imageUrl,verified:true
      };
      await dbSavePhoto(photoData);
      onUpload(photoData);
      onClose();
    }catch(e){
      setError("Upload failed — check your connection and try again.");
    }finally{
      setSubmitting(false);
    }
  };

  const inp={width:"100%",background:C.inputBg,border:`1px solid ${C.inputBorder}`,color:C.text,borderRadius:"3px",padding:"9px 12px",fontFamily:"monospace",fontSize:"12px",outline:"none",boxSizing:"border-box"};
  const lbl={fontFamily:"monospace",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.12em",color:C.textFaint,display:"block",marginBottom:"5px"};

  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,background:C.lightboxBg,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(12px)"}}>
      <div style={{width:"min(580px,94vw)",background:C.modalBg,border:`1px solid ${C.modalBorder}`,borderRadius:"6px",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{padding:"18px 22px",borderBottom:`1px solid ${C.divider}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <h3 style={{margin:0,fontFamily:"Georgia,serif",fontSize:"18px",color:C.text,fontStyle:"italic"}}>Add to Archive</h3>
            <p style={{margin:"2px 0 0",fontFamily:"monospace",fontSize:"9px",color:C.textFaint,letterSpacing:"0.12em",textTransform:"uppercase"}}>Real media only — no AI images</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,fontSize:"22px",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"20px 22px",display:"flex",flexDirection:"column",gap:"13px"}}>
          <div onClick={()=>fileRef.current.click()} onDrop={e=>{e.preventDefault();readFile(e.dataTransfer.files[0]);}} onDragOver={e=>e.preventDefault()}
            style={{border:`2px dashed ${preview?theme.accent:C.inputBorder}`,borderRadius:"4px",padding:"18px",textAlign:"center",cursor:"pointer",background:C.uploadBg,minHeight:"130px",display:"flex",alignItems:"center",justifyContent:"center",transition:"border-color 0.2s"}}>
            {preview?<img src={preview} alt="preview" style={{maxHeight:"150px",maxWidth:"100%",objectFit:"contain",borderRadius:"3px"}}/>:
              <div><div style={{fontSize:"24px",marginBottom:"7px"}}>📷</div><p style={{margin:0,fontFamily:"monospace",fontSize:"11px",color:C.textMuted}}>Click or drag a photo here</p><p style={{margin:"3px 0 0",fontFamily:"monospace",fontSize:"10px",color:C.textFaint}}>JPG · PNG · WEBP</p></div>}
            <input ref={fileRef} type="file" accept="image/*" onChange={e=>readFile(e.target.files[0])} style={{display:"none"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"11px"}}>
            <div style={{gridColumn:"1/-1"}}><label style={lbl}>Title / Caption *</label><input style={inp} placeholder='e.g. "Bad Tour, Wembley 1988"' value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div>
            <div><label style={lbl}>Era</label><select style={{...inp,cursor:"pointer"}} value={form.era} onChange={e=>setForm({...form,era:e.target.value})}>{ERA_LIST.filter(e=>e!=="All").map(era=><option key={era}>{era}</option>)}</select></div>
            <div><label style={lbl}>Year</label><input style={inp} type="number" min="1958" max="2009" placeholder="e.g. 1988" value={form.year} onChange={e=>setForm({...form,year:e.target.value})}/></div>
            <div><label style={lbl}>Source / Credit</label><input style={inp} placeholder="Fan Archive, Press Photo..." value={form.source} onChange={e=>setForm({...form,source:e.target.value})}/></div>
            <div><label style={lbl}>Layout</label><select style={{...inp,cursor:"pointer"}} value={form.aspect} onChange={e=>setForm({...form,aspect:e.target.value})}><option value="portrait">Portrait (tall)</option><option value="landscape">Landscape (wide)</option><option value="square">Square</option></select></div>
            <div style={{gridColumn:"1/-1"}}><label style={lbl}>Tags (comma-separated)</label><input style={inp} placeholder="concert, tour, candid..." value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})}/></div>
            <div style={{gridColumn:"1/-1"}}><label style={lbl}>Notes</label><textarea style={{...inp,resize:"vertical",minHeight:"58px"}} placeholder="Location, photographer, context..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
          </div>
          {error&&<p style={{margin:0,fontFamily:"monospace",fontSize:"11px",color:"#e04040",padding:"8px 12px",background:"rgba(224,64,64,0.08)",border:"1px solid rgba(224,64,64,0.2)",borderRadius:"3px"}}>{error}</p>}
          <div style={{padding:"9px 12px",background:theme.badge,border:`1px solid ${theme.badgeBorder}`,borderRadius:"3px"}}>
            <p style={{margin:0,fontFamily:"monospace",fontSize:"10px",color:theme.accent,lineHeight:1.6}}>★ By submitting, you confirm this is real, unaltered media from your personal archive.</p>
          </div>
          <button onClick={handleSubmit} disabled={!ready}
            style={{width:"100%",padding:"12px",background:ready?theme.accent:"transparent",border:`1px solid ${ready?theme.accent:C.inputBorder}`,borderRadius:"3px",cursor:ready?"pointer":"not-allowed",fontFamily:"monospace",fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.15em",color:ready?"#fff":C.textFaint,fontWeight:"bold",transition:"all 0.2s"}}>
            {submitting?"Uploading...":ready?"Add to Archive":"Select a photo to continue"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main app ───────────────────────────────────────────────────────────────────
function App(){
  const [showSplash,setShowSplash]=useState(true);
  const [siteVisible,setSiteVisible]=useState(false);
  const [photos,setPhotos]=useState(SAMPLES);
  const [dbLoaded,setDbLoaded]=useState(false);
  const [activeEra,setActiveEra]=useState("All");
  const [search,setSearch]=useState("");
  const [view,setView]=useState("grid");
  const [lightbox,setLightbox]=useState(null);
  const [showUpload,setShowUpload]=useState(false);
  const [darkMode,setDarkMode]=useState(()=>window.matchMedia("(prefers-color-scheme: dark)").matches);
  const [manualOverride,setManualOverride]=useState(false);

  // Load photos from Supabase on mount
  useEffect(()=>{
    dbFetchPhotos().then(dbPhotos=>{
      if(dbPhotos.length>0){
        // Show real photos first, then samples for eras with no real photos
        setPhotos([...dbPhotos,...SAMPLES]);
      }
      setDbLoaded(true);
    });
  },[]);

  // System dark mode listener
  useEffect(()=>{
    if(manualOverride)return;
    const mq=window.matchMedia("(prefers-color-scheme: dark)");
    const h=e=>setDarkMode(e.matches);
    mq.addEventListener("change",h);
    return()=>mq.removeEventListener("change",h);
  },[manualOverride]);

  const C=darkMode?COLORS.dark:COLORS.light;
  const theme=ERA_THEMES[activeEra]||ERA_THEMES["All"];
  const handleEnter=()=>{setShowSplash(false);setTimeout(()=>setSiteVisible(true),50);};

  const filtered=photos.filter(p=>{
    const eraOk=activeEra==="All"||p.era===activeEra;
    const q=search.toLowerCase();
    const searchOk=!q||p.title.toLowerCase().includes(q)||p.era.toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q))||String(p.year).includes(q);
    return eraOk&&searchOk;
  });

  // Deduplicate — if a real photo exists for an era, hide the sample for that era
  const realEras=new Set(photos.filter(p=>!p.isSample).map(p=>p.era));
  const displayPhotos=filtered.filter(p=>!(p.isSample&&realEras.has(p.era)));

  const lbIdx=lightbox?displayPhotos.findIndex(p=>p.id===lightbox.id):-1;
  const uploads=photos.filter(p=>!p.isSample).length;

  const heroSrc=(()=>{
    const real=photos.filter(p=>!p.isSample&&(activeEra==="All"||p.era===activeEra));
    if(real.length>0) return real[0].placeholder;
    return HERO_BG[activeEra];
  })();

  const heroText=darkMode?theme.heroTextDark:theme.heroTextLight;
  const heroGrad=darkMode?theme.grad:theme.gradLight;

  const viewBtn=(active)=>({
    background:active?theme.badge:"none",
    border:`1px solid ${active?theme.badgeBorder:C.inputBorder}`,
    color:active?theme.accent:C.textMuted,
    padding:"5px 12px",borderRadius:"3px",cursor:"pointer",
    fontFamily:"monospace",fontSize:"10px",textTransform:"uppercase",
    letterSpacing:"0.1em",transition:"all 0.3s"
  });

  return(
    <div style={{minHeight:"100vh",background:C.pageBg,transition:"background 0.3s ease"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Teko:wght@700&display=swap');*{box-sizing:border-box}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:${C.pageBg}}::-webkit-scrollbar-thumb{background:${C.scrollThumb};border-radius:3px}button:focus{outline:none}input:focus,select:focus,textarea:focus{outline:none}`}</style>

      {showSplash&&<Splash onEnter={handleEnter}/>}

      <div style={{opacity:siteVisible?1:0,transition:"opacity 0.6s ease",minHeight:"100vh"}}>

        {/* Header */}
        <header style={{borderBottom:`1px solid ${C.divider}`,background:C.headerBg,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(20px)"}}>
          <div style={{maxWidth:"1280px",margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",height:"54px",gap:"10px"}}>
              <div>
                <h1 style={{margin:0,fontFamily:"'Teko',sans-serif",fontSize:"20px",color:C.text,letterSpacing:"0.05em",fontWeight:700,lineHeight:1}}>THE MJ CATALOG</h1>
                <p style={{margin:"1px 0 0",fontFamily:"monospace",fontSize:"8px",color:C.textVeryFaint,letterSpacing:"0.1em",textTransform:"uppercase"}}>
                  {uploads>0?`${uploads} photos archived`:"Loading archive..."}
                </p>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
                <button onClick={()=>{setDarkMode(d=>!d);setManualOverride(true);}}
                  style={{background:"none",border:`1px solid ${C.inputBorder}`,color:C.textMuted,width:"34px",height:"34px",borderRadius:"3px",cursor:"pointer",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=theme.accent;e.currentTarget.style.color=theme.accent;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.inputBorder;e.currentTarget.style.color=C.textMuted;}}>
                  {darkMode?"☀":"🌙"}
                </button>
                <button onClick={()=>setShowUpload(true)}
                  style={{background:theme.accent,border:"none",color:"#fff",padding:"8px 14px",borderRadius:"3px",cursor:"pointer",fontFamily:"monospace",fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:"bold",whiteSpace:"nowrap",transition:"background 0.5s"}}>
                  + Add Photo
                </button>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"0 16px 10px",borderTop:`1px solid ${C.divider}`}}>
              <div style={{position:"relative",flex:1}}>
                <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}
                  style={{width:"100%",background:C.inputBg,border:`1px solid ${C.inputBorder}`,color:C.inputColor,padding:"7px 11px 7px 28px",borderRadius:"3px",fontSize:"11px",fontFamily:"monospace",outline:"none",boxSizing:"border-box"}}/>
                <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",color:C.textFaint,fontSize:"12px"}}>⌕</span>
              </div>
              <div style={{display:"flex",gap:"4px",flexShrink:0}}>
                <button onClick={()=>setView("grid")} style={viewBtn(view==="grid")}>▦ Grid</button>
                <button onClick={()=>setView("timeline")} style={viewBtn(view==="timeline")}>↕ Timeline</button>
              </div>
            </div>
          </div>
        </header>

        {/* Hero */}
        <div style={{position:"relative",borderBottom:`1px solid ${C.divider}`,overflow:"hidden",minHeight:"220px"}}>
          <img key={heroSrc} src={heroSrc} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"center",opacity:darkMode?0.45:0.25,filter:"saturate(1.2)"}}/>
          <div style={{position:"absolute",inset:0,background:`linear-gradient(to right,${C.heroOverlay} 0%,${darkMode?"rgba(13,8,18,0.6)":"rgba(250,246,248,0.6)"} 50%,${darkMode?"rgba(13,8,18,0.4)":"rgba(250,246,248,0.4)"} 100%), ${heroGrad}`,opacity:0.92,transition:"background 0.6s ease"}}/>
          <div style={{position:"relative",zIndex:2,padding:"28px 16px 24px",maxWidth:"1280px",margin:"0 auto",display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:"20px",flexWrap:"wrap"}}>
            <div>
              <p style={{margin:"0 0 6px",fontFamily:"monospace",fontSize:"9px",color:theme.accent,textTransform:"uppercase",letterSpacing:"0.2em",opacity:0.8}}>{theme.desc}</p>
              <h2 style={{margin:0,fontFamily:"'Teko',sans-serif",fontSize:"clamp(40px,6vw,72px)",color:heroText,fontWeight:700,lineHeight:0.95,textShadow:darkMode?"0 2px 24px rgba(0,0,0,0.9)":"0 2px 16px rgba(0,0,0,0.15)",letterSpacing:"0.04em",textTransform:"uppercase",transition:"color 0.5s"}}>
                {activeEra==="All"?"THE MJ\nCATALOG":activeEra.toUpperCase()}
              </h2>
              <p style={{margin:"9px 0 0",fontFamily:"monospace",fontSize:"11px",color:C.textMuted,maxWidth:"400px",lineHeight:1.8,letterSpacing:"0.03em"}}>A community archive of authentic, unaltered photography.</p>
            </div>
            <div style={{display:"flex",gap:"26px",flexShrink:0}}>
              {[["Photos",displayPhotos.filter(p=>!p.isSample).length||"—"],["Eras","9"],["Uploads",uploads||"—"]].map(([l,v])=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontFamily:"'Teko',sans-serif",fontSize:"28px",color:theme.accent,fontWeight:700,letterSpacing:"0.04em",transition:"color 0.5s"}}>{v}</div>
                  <div style={{fontFamily:"monospace",fontSize:"9px",color:C.textFaint,textTransform:"uppercase",letterSpacing:"0.15em",marginTop:"2px"}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Era tabs */}
        <div style={{borderBottom:`1px solid ${C.divider}`,background:C.tabsBg,padding:"0 16px",position:"sticky",top:"94px",zIndex:90,overflowX:"auto",backdropFilter:"blur(20px)"}}>
          <div style={{maxWidth:"1280px",margin:"0 auto",display:"flex",minWidth:"max-content"}}>
            {ERA_LIST.map(era=>{
              const t=ERA_THEMES[era];const isActive=activeEra===era;
              return(
                <button key={era} onClick={()=>setActiveEra(era)} style={{background:"none",border:"none",cursor:"pointer",padding:"13px 14px",fontSize:"10px",letterSpacing:"0.1em",textTransform:"uppercase",whiteSpace:"nowrap",fontFamily:"monospace",color:isActive?t.accent:C.textMuted,borderBottom:isActive?`2px solid ${t.accent}`:"2px solid transparent",transition:"color 0.3s,border-color 0.3s"}}
                  onMouseEnter={e=>{if(!isActive)e.currentTarget.style.color=t.accent+"99";}}
                  onMouseLeave={e=>{if(!isActive)e.currentTarget.style.color=C.textMuted;}}>
                  {era}
                </button>
              );
            })}
          </div>
        </div>

        {/* Gallery */}
        <main style={{padding:"20px 16px 60px",maxWidth:"1280px",margin:"0 auto"}}>
          {!dbLoaded&&(
            <p style={{fontFamily:"monospace",fontSize:"10px",color:C.textFaint,marginBottom:"16px",letterSpacing:"0.08em",textTransform:"uppercase",textAlign:"center",padding:"20px"}}>
              Loading archive...
            </p>
          )}
          {displayPhotos.length===0?(
            <div style={{textAlign:"center",padding:"80px",fontFamily:"monospace",color:C.textFaint,fontSize:"11px",letterSpacing:"0.1em",textTransform:"uppercase"}}>
              No photos found{search&&` for "${search}"`}
            </div>
          ):view==="grid"?(
            <>
              <p style={{fontFamily:"monospace",fontSize:"10px",color:C.textVeryFaint,marginBottom:"16px",letterSpacing:"0.08em",textTransform:"uppercase"}}>
                {displayPhotos.filter(p=>!p.isSample).length} photos · {activeEra!=="All"?activeEra:"All Eras"}{search&&` · "${search}"`}
              </p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(225px,1fr))",gap:"13px"}}>
                {displayPhotos.map(p=><PhotoCard key={p.id} photo={p} onClick={setLightbox} theme={theme} C={C}/>)}
              </div>
            </>
          ):(
            <>
              <p style={{fontFamily:"monospace",fontSize:"10px",color:C.textVeryFaint,marginBottom:"28px",letterSpacing:"0.08em",textTransform:"uppercase"}}>
                Chronological view{search&&` · "${search}"`}
              </p>
              <TimelineView photos={displayPhotos} onPhotoClick={setLightbox} theme={theme} C={C}/>
            </>
          )}
        </main>

        <footer style={{borderTop:`1px solid ${C.divider}`,padding:"16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Teko',sans-serif",fontSize:"16px",color:C.textVeryFaint,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase"}}>The MJ Catalog</span>
          <span style={{fontFamily:"monospace",fontSize:"9px",color:C.textVeryFaint,letterSpacing:"0.1em",textTransform:"uppercase"}}>Real Media Only · No AI Images · Community Curated</span>
        </footer>
      </div>

      {lightbox&&<Lightbox photo={lightbox} onClose={()=>setLightbox(null)} theme={theme} C={C} onNext={()=>setLightbox(displayPhotos[(lbIdx+1)%displayPhotos.length])} onPrev={()=>setLightbox(displayPhotos[(lbIdx-1+displayPhotos.length)%displayPhotos.length])}/>}
      {showUpload&&<UploadModal onClose={()=>setShowUpload(false)} onUpload={p=>{setPhotos(prev=>[p,...prev]);}} theme={theme} C={C}/>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
